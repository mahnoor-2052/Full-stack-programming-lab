<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Task 7 – Drag & Drop Sortable List</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>

  <div class="shell">
    <div class="intro">
      <span class="num">07</span>
      <div>
        <h1>Sortable List</h1>
        <p>Drag items to reorder them</p>
      </div>
    </div>

    <div class="hint">☰ Grab the handle and drag</div>

    <ul id="sortList">
      <li data-id="1"><span class="handle">⠿</span><span class="item-label">🏔 Mountain Hiking</span><span class="order-badge">1</span></li>
      <li data-id="2"><span class="handle">⠿</span><span class="item-label">🌊 Surfing the Waves</span><span class="order-badge">2</span></li>
      <li data-id="3"><span class="handle">⠿</span><span class="item-label">🌲 Forest Camping</span><span class="order-badge">3</span></li>
      <li data-id="4"><span class="handle">⠿</span><span class="item-label">🚵 Mountain Biking</span><span class="order-badge">4</span></li>
      <li data-id="5"><span class="handle">⠿</span><span class="item-label">🎣 River Fishing</span><span class="order-badge">5</span></li>
      <li data-id="6"><span class="handle">⠿</span><span class="item-label">🧗 Rock Climbing</span><span class="order-badge">6</span></li>
    </ul>

    <div class="order-display">
      <span class="od-label">Current order:</span>
      <span id="orderText">1, 2, 3, 4, 5, 6</span>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
