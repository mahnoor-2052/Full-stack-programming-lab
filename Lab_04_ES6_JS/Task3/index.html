<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Task 3 – Form Validation</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>

  <div class="wrapper">
    <div class="card">
      <div class="card-header">
        <span class="task-tag">TASK 03</span>
        <h2>Create Account</h2>
        <p>Fill in the details below to register.</p>
      </div>

      <div id="successMsg" class="success-banner" style="display:none;">
        ✓ Account created successfully!
      </div>

      <div class="form-body">
        <div class="field-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" placeholder="John Doe" />
          <span class="err" id="nameErr"></span>
        </div>

        <div class="field-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="john@example.com" />
          <span class="err" id="emailErr"></span>
        </div>

        <div class="field-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Min. 8 characters" />
          <span class="err" id="passErr"></span>
        </div>

        <div class="field-group">
          <label for="confirm">Confirm Password</label>
          <input type="password" id="confirm" placeholder="Re-enter password" />
          <span class="err" id="confirmErr"></span>
        </div>

        <button id="submitBtn">Create Account</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
