<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Task 5 – Chained Style Editor</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>

  <main>

    <aside class="sidebar">
      <div class="sidebar-top">
        <span class="task-label">TASK — 05</span>
        <h1>Style<br>Editor</h1>
        <p class="desc">Customize the text using the controls below.</p>
      </div>

      <div class="control-sections">

        <div class="ctrl-section">
          <h3>Font Size</h3>
          <div class="btn-row">
            <button id="sizeUp">Larger</button>
            <button id="sizeDown">Smaller</button>
            <button id="sizeReset" class="ghost">Reset</button>
          </div>
        </div>

        <div class="ctrl-section">
          <h3>Text Color</h3>
          <div class="swatch-row">
            <button class="swatch" id="colorCream"   style="background:#f5ede0;" title="Cream"></button>
            <button class="swatch" id="colorTerra"   style="background:#c0552a;" title="Terracotta"></button>
            <button class="swatch" id="colorGold"    style="background:#c9972c;" title="Gold"></button>
            <button class="swatch" id="colorSlate"   style="background:#2e3a4e;" title="Slate"></button>
            <button class="swatch" id="colorBlush"   style="background:#d4748a;" title="Blush"></button>
          </div>
        </div>

        <div class="ctrl-section">
          <h3>Background</h3>
          <div class="swatch-row">
            <button class="swatch" id="bgNone"   style="background: linear-gradient(135deg,#f9f2e8,#f0e6d2); outline: 2px solid #c8b89a;" title="Default"></button>
            <button class="swatch" id="bgDusk"   style="background: linear-gradient(135deg,#1a0e2e,#2e1a0e);" title="Dusk"></button>
            <button class="swatch" id="bgSage"   style="background: linear-gradient(135deg,#e8f0e4,#d4e8d0);" title="Sage"></button>
            <button class="swatch" id="bgSunset" style="background: linear-gradient(135deg,#c0552a,#c9972c);" title="Sunset"></button>
          </div>
        </div>

        <div class="ctrl-section">
          <h3>Style Toggles</h3>
          <div class="btn-row">
            <button class="toggle" id="toggleBold">Bold</button>
            <button class="toggle" id="toggleItalic">Italic</button>
            <button class="toggle" id="toggleUnder">Underline</button>
          </div>
        </div>

        <div class="ctrl-section">
          <h3>Reset</h3>
          <div class="btn-row">
            <button id="resetAll" class="reset-btn">Reset Everything</button>
          </div>
        </div>

      </div>
    </aside>

    <section class="preview-panel">
      <div class="preview-label">PREVIEW</div>
      <div class="text-frame">
        <p id="styledText">
          The quick brown fox jumps over the lazy dog. Style me however you like using the controls on the left!
        </p>
      </div>
      <div class="current-styles" id="styleReadout">font-size: 20px</div>
    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
